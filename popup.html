<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #e1e4e8;
      background: #1a1d23;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f0f3f6;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #363b44;
      border-radius: 6px;
      background: #272b33;
      color: #e1e4e8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      margin-bottom: 8px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: #2d333b;
      border-color: #539bf5;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn .label { display: block; }
    .btn .hint {
      display: block;
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #8b949e;
      min-height: 16px;
    }

    #status.error { color: #f85149; }
    #status.success { color: #3fb950; }

    .not-tour {
      color: #8b949e;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <h1>Graphite Tour Export</h1>

  <div id="content">
    <button class="btn" id="copyBtn">
      <span class="label">Copy as Markdown</span>
      <span class="hint">Extract tour and copy to clipboard</span>
    </button>

    <button class="btn" id="githubBtn">
      <span class="label">Comment on GitHub PR</span>
      <span class="hint">Open PR and pre-fill a comment</span>
    </button>

    <div id="status"></div>
  </div>

  <div id="notTour" class="not-tour" style="display:none">
    Open a Graphite PR in Tour mode to use this extension.
  </div>

  <script src="popup.js"></script>
</body>
</html>
